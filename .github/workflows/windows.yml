name: Windows
# kotleni 01.03.2026 - Change tests to artifacts gatchering
on: [push, pull_request]

jobs:
  msbuild:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022, windows-2025]
        toolset: [ClangCL, MSVC]
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Add msbuild to PATH
      uses: microsoft/setup-msbuild@v2

    - name: Set toolset
      if: matrix.toolset == 'ClangCL'
      run: echo "toolset=/p:PlatformToolset=${{ matrix.toolset }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Build
      shell: cmd
      run: msbuild Osiris.sln /p:Platform=x64 /p:Configuration=${{ matrix.configuration }} ${{ env.toolset }}

    - name: Upload MSBuild artifact
      uses: actions/upload-artifact@v4
      with:
        name: msbuild-${{ matrix.os }}-${{ matrix.toolset }}-${{ matrix.configuration }}
        path: |
          **/x64/${{ matrix.configuration }}/Osiris*.dll
          **/x64/${{ matrix.configuration }}/Osiris*.exe
        if-no-files-found: error

  cmake:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-2022, windows-2025]
        toolset: [ClangCL, MSVC]
        configuration: [Debug, Release]

    steps:
    - uses: actions/checkout@v4

    - name: Set toolset
      if: matrix.toolset == 'ClangCL'
      run: echo "toolset=-T ${{ matrix.toolset }}" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

    - name: Configure
      run: cmake -Werror=dev -D CMAKE_COMPILE_WARNING_AS_ERROR=1 -A x64 ${{ env.toolset }} -B build

    - name: Build
      run: cmake --build build --target Osiris --config ${{ matrix.configuration }}

    - name: Upload CMake artifact
      uses: actions/upload-artifact@v4
      with:
        name: cmake-${{ matrix.os }}-${{ matrix.toolset }}-${{ matrix.configuration }}
        path: |
          build/${{ matrix.configuration }}/Osiris*.dll
          build/${{ matrix.configuration }}/Osiris*.exe
        if-no-files-found: error
